apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vector-logging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: logging
  source:
    repoURL: https://github.com/koz4/logging-gitops.git
    targetRevision: HEAD
    path: vector
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: loki-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
