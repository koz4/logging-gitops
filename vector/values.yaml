role: Agent

customConfig:
  sources:
    kubernetes_logs:
      type: kubernetes_logs
    journald_logs:
      type: journald
    syslog_udp:
      type: syslog
      address: 0.0.0.0:514
      mode: udp
    syslog_tcp:
      type: syslog
      address: 0.0.0.0:514
      mode: tcp

  transforms:
    route_logs:
      type: remap
      inputs: ["kubernetes_logs", "journald_logs", "syslog_udp", "syslog_tcp"]
      source: |
        .cluster_id = "cluster-01"
        if exists(.kubernetes) {
          .tenant = "application"
        } else if exists(.syslog) {
          .tenant = "network"
        } else {
          .tenant = "infrastructure"
        }

  sinks:
    loki_gateway:
      type: loki
      inputs: ["route_logs"]
      endpoint: "http://logging-gateway-http.loki-stack.svc:8080"
      auth:
        strategy: bearer
        token: "${VECTOR_TOKEN}"
      labels:
        tenant: "{{ .tenant }}"
        source_type: "{{ .source_type }}"
      request:
        headers:
          X-Scope-OrgID: "{{ .tenant }}"

containerDefs:
  - name: vector
    env:
      - name: VECTOR_TOKEN
        valueFrom:
          secretKeyRef:
            name: vector-token-secret
            key: token

service:
  enabled: true
  type: LoadBalancer
  ports:
    - name: syslog-udp
      port: 514
      protocol: UDP
    - name: syslog-tcp
      port: 514
      protocol: TCP
