role: Agent

persistence:
  enabled: false

containerSecurityContext:
  privileged: true
  runAsUser: 0

customConfig:
  sources:
    kubernetes_logs:
      type: kubernetes_logs
      data_dir: /tmp # Bezpośrednio w /tmp
    journald_logs:
      type: journald
      data_dir: /tmp # Bezpośrednio w /tmp
    syslog_udp:
      type: syslog
      address: 0.0.0.0:514
      mode: udp
    syslog_tcp:
      type: syslog
      address: 0.0.0.0:514
      mode: tcp

  transforms:
    route_logs:
      type: remap
      inputs: ["kubernetes_logs", "journald_logs", "syslog_udp", "syslog_tcp"]
      source: |
        .cluster_id = "cluster-01"
        if exists(.kubernetes) {
          .tenant = "application"
        } else if exists(.syslog) {
          .tenant = "network"
        } else {
          .tenant = "infrastructure"
        }

  sinks:
    loki_gateway:
      type: loki
      inputs: ["route_logs"]
      endpoint: "http://logging-gateway-http.loki-stack.svc:8080"
      auth:
        strategy: bearer
        token: "${VECTOR_TOKEN}"
      labels:
        tenant: "{{ .tenant }}"
        source_type: "{{ .source_type }}"
      encoding:
        codec: json
      request:
        headers:
          X-Scope-OrgID: "{{ .tenant }}"

extraEnv:
  - name: VECTOR_TOKEN
    valueFrom:
      secretKeyRef:
        name: vector-token-secret
        key: token

extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

service:
  enabled: true
  type: LoadBalancer
  ports:
    - name: syslog-udp
      port: 514
      protocol: UDP
    - name: syslog-tcp
      port: 514
      protocol: TCP
