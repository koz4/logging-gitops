role: Agent

image:
  repository: timberio/vector
  tag: 0.43.0-alpine

persistence:
  enabled: false

containerSecurityContext:
  privileged: true
  runAsUser: 0

customConfig:
  sources:
    kubernetes_logs:
      type: kubernetes_logs
      data_dir: /tmp
    journald_logs:
      type: journald
      data_dir: /tmp
    syslog_udp:
      type: syslog
      address: 0.0.0.0:514
      mode: udp
    syslog_tcp:
      type: syslog
      address: 0.0.0.0:514
      mode: tcp

  transforms:
    route_logs:
      type: remap
      inputs: ["kubernetes_logs", "journald_logs", "syslog_udp", "syslog_tcp"]
      source: |
        .cluster_id = "cluster-01"
        if exists(.kubernetes) {
          .tenant = "application"
        } else if exists(.syslog) {
          .tenant = "network"
        } else {
          .tenant = "infrastructure"
        }

  sinks:
    loki_gateway:
      type: loki
      inputs: ["route_logs"]
      endpoint: "https://logging-gateway-http.loki-stack.svc:8080" # Użycie HTTPS
      tls:
        verify_certificate: false # Skip TLS verify dla komunikacji wewnętrznej
      auth:
        strategy: bearer
        token: "${VECTOR_TOKEN}"
      labels:
        tenant: "{{ .tenant }}" # Dynamiczna etykieta
        source_type: "{{ .source_type }}"
      encoding:
        codec: json
      request:
        headers:
          X-Scope-OrgID: "{{ .tenant }}" # Dynamiczny nagłówek tenant

extraEnv:
  - name: VECTOR_TOKEN
    valueFrom:
      secretKeyRef:
        name: vector-token-secret
        key: token

extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

service:
  enabled: true
  type: LoadBalancer
  ports:
    - name: syslog-udp
      port: 514
      protocol: UDP
    - name: syslog-tcp
      port: 514
      protocol: TCP
