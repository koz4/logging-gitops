apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-application
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: "Loki (Applications)"
    type: loki
    url: "https://logging-gateway-http.loki-stack.svc:8080"
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
      httpHeaderName2: "Authorization"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "application"
      # UWAGA: Ten token musi być aktualny. Wypchnij plik po wygenerowaniu tokena.
      httpHeaderValue2: "Bearer PLACEHOLDER_TOKEN" 
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-network
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: "Loki (Network)"
    type: loki
    url: "https://logging-gateway-http.loki-stack.svc:8080"
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
      httpHeaderName2: "Authorization"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "network"
      httpHeaderValue2: "Bearer PLACEHOLDER_TOKEN"
