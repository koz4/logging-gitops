apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-application
  namespace: grafana-operator-ns # ZMIEŃ NA NAMESPACE TWOJEJ GRAFANY
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: "Loki (Applications)"
    type: loki
    url: "https://logging-loki-gateway-http.loki-stack.svc:8080"
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "application"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-network
  namespace: grafana-operator-ns
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: "Loki (Network)"
    type: loki
    url: "https://logging-loki-gateway-http.loki-stack.svc:8080"
    jsonData:
      httpHeaderName1: "X-Scope-OrgID"
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "network"
