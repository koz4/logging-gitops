apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: loki-application-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  resourcetype: "grafana" # Dodane dla zgodności z v5 operatora
  dashboard:
    title: "Loki: Application Logs"
    uid: "loki-apps-fixed"
    tags: ["loki", "apps"]
    timezone: "browser"
    schemaVersion: 36
    panels:
      - title: "Log Streams"
        type: "logs"
        gridPos: { h: 20, w: 24, x: 0, y: 0 }
        targets:
          - expr: "{tenant=\"application\"}"
            datasource: { type: "loki", uid: "Loki-Final-Fixed" }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: loki-network-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  resourcetype: "grafana"
  dashboard:
    title: "Loki: Network Logs (Syslog)"
    uid: "loki-network-fixed"
    tags: ["loki", "network"]
    timezone: "browser"
    schemaVersion: 36
    panels:
      - title: "Network Log Streams"
        type: "logs"
        gridPos: { h: 20, w: 24, x: 0, y: 0 }
        targets:
          - expr: "{tenant=\"network\"}"
            datasource: { type: "loki", uid: "Loki-Final-Fixed" }
