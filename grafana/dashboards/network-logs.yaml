apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: loki-network-logs
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  dashboard:
    title: "Loki: Network Devices (Syslog)"
    uid: "loki-network"
    tags: ["loki", "syslog", "network"]
    timezone: "browser"
    schemaVersion: 36
    panels:
      - title: "Syslog Events by Host"
        type: "timeseries"
        gridPos: { h: 8, w: 24, x: 0, y: 0 }
        targets:
          - expr: "sum by (host) (count_over_time({tenant=\"network\"} [$__interval]))"
            legendFormat: "{{host}}"
            datasource: { type: "loki", uid: "Loki-Final-Fixed" }
      - title: "Recent Network Events"
        type: "logs"
        gridPos: { h: 16, w: 24, x: 0, y: 8 }
        targets:
          - expr: "{tenant=\"network\"}"
            datasource: { type: "loki", uid: "Loki-Final-Fixed" }
    templating:
      list:
        - name: "host"
          type: "query"
          query: "label_values({tenant=\"network\"}, host)"
          datasource: { type: "loki", uid: "loki-network" }
          refresh: 1
          includeAll: true
